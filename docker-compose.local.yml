services:
  openclaw:
    image: openclaw:local
    expose:
      - "${PORT:-8080}"
    environment:
      # Provider (at least one required)
      - OPENCODE_API_KEY=${OPENCODE_API_KEY:-aaa}
      - LITELLM_API_KEY=${LITELLM_API_KEY:-}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
      - OPENCLAW_PRIMARY_MODEL=litellm/Agentic
      - COOLIFY_FQDN=${SERVICE_FQDN_OPENCLAW}
      - SEARXNG_BASE_URL=https://searxng-g44cookggsos08gkgg0cogc0.vcorp.ai/
      - SEARXNG_ENGINES=google,bing,duckduckgo
      # Auth
      - AUTH_USERNAME=${AUTH_USERNAME:-admin}
      - AUTH_PASSWORD=${SERVICE_PASSWORD_AUTH}
      - OPENCLAW_GATEWAY_TOKEN=${SERVICE_PASSWORD_GATEWAY}
      # Browser sidecar
      - BROWSER_CDP_URL=http://browser:9223
      - BROWSER_DEFAULT_PROFILE=openclaw
      - BROWSER_EVALUATE_ENABLED=true
      - BROWSER_REMOTE_TIMEOUT_MS=30000
      - BROWSER_REMOTE_HANDSHAKE_TIMEOUT_MS=30000
      # MQTT plugin (EMQX)
      - MQTT_BROKER_URL=${MQTT_BROKER_URL:-}
      - MQTT_USERNAME=${MQTT_USERNAME:-}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-}
      - MQTT_CLIENT_ID=${MQTT_CLIENT_ID:-openclaw}
      - MQTT_SUBSCRIBE_TOPICS=${MQTT_SUBSCRIBE_TOPICS:-}
      - MQTT_QOS=${MQTT_QOS:-1}
    volumes:
      - openclaw-data:/data
    depends_on:
      - browser
    restart: unless-stopped

  browser:
    image: openclaw-browser:local
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - CHROME_CLI=--remote-debugging-port=9222
    volumes:
      - browser-data:/config
    shm_size: 2g
    restart: unless-stopped

volumes:
  openclaw-data:
  browser-data:
