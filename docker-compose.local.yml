services:
  openclaw:
    image: openclaw:local
    expose:
      - "${PORT:-8080}"
    environment:
      # Provider (at least one required)
      - OPENCODE_API_KEY=${OPENCODE_API_KEY:-aaa}
      - OPENCLAW_PRIMARY_MODEL=litellm/Agentic
      - COOLIFY_FQDN=${SERVICE_FQDN_OPENCLAW}
      # Auth
      - AUTH_USERNAME=${AUTH_USERNAME:-admin}
      - AUTH_PASSWORD=${SERVICE_PASSWORD_AUTH}
      - OPENCLAW_GATEWAY_TOKEN=${SERVICE_PASSWORD_GATEWAY}
      - OPENCLAW_DISABLE_DEVICE_AUTH=true
      # Browser sidecar
      - BROWSER_CDP_URL=http://browser:9223
      - BROWSER_DEFAULT_PROFILE=openclaw
      - BROWSER_EVALUATE_ENABLED=true
      - BROWSER_REMOTE_TIMEOUT_MS=30000
      - BROWSER_REMOTE_HANDSHAKE_TIMEOUT_MS=30000
    volumes:
      - openclaw-data:/data
    extra_hosts:
      - "litellm.hseri.com:192.168.68.40"
    depends_on:
      - browser
    restart: unless-stopped

  browser:
    image: openclaw-browser:local
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - CHROME_CLI=--remote-debugging-port=9222
    volumes:
      - browser-data:/config
    shm_size: 2g
    restart: unless-stopped

volumes:
  openclaw-data:
  browser-data:
